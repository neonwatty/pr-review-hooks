name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  hook-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verify jq is available
        run: jq --version

      - name: Run hook regression tests
        run: ./hooks/test.sh
